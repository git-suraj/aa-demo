receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  otlphttp/opik:
    endpoint: ${env:OPIK_OTLP_TRACES_ENDPOINT}
    headers:
      projectName: ${env:OPIK_PROJECT_NAME}
      Comet-Workspace: ${env:OPIK_WORKSPACE}
  prometheus:
    endpoint: 0.0.0.0:9464
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers:
        - otlp
      processors:
        - batch
      exporters:
        - otlphttp/opik
        - debug
    metrics:
      receivers:
        - otlp
      processors:
        - batch
      exporters:
        - prometheus
        - debug
